name: Sachin Portfolio CICD

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------
  # STAGE 1: Git Leak Detection (Security Scan)
  # ---------------------------------------------------------
  git-leaks:
    name: GIT-LEAK-SCAN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false 

  # ---------------------------------------------------------
  # STAGE 2: Build (Freeze Flask Application)
  # ---------------------------------------------------------
  build:
    name: BUILD
    needs: git-leaks 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Freeze Flask App
        run: python freeze.py

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4 
        with:
          name: portfolio-build
          path: build/ 

  # ---------------------------------------------------------
  # STAGE 3: Test (Basic Verification Checks)
  # ---------------------------------------------------------
  test:
    name: TEST
    needs: build 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4 
        with:
          name: portfolio-build
          path: build/

      - name: Validate Build Output Structure
        run: |
          echo "Checking if main build files exist..."
          if [ ! -f "build/index.html" ]; then
            echo "CRITICAL ERROR: build/index.html missing!"
            exit 1
          fi
          echo "Build integrity check successful."

  # ---------------------------------------------------------
  # STAGE 4: Deploy (Official GitHub Pages Direct Deployment)
  # ---------------------------------------------------------
  deploy:
    name: DEPLOY
    needs: test 
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Compiled Artifacts
        uses: actions/download-artifact@v4 
        with:
          name: portfolio-build
          path: build/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/ # Uploads build directory contents directly to Pages infrastructure

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4